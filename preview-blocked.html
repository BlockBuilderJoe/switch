<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blocked Page Previewer</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#000;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center}
    .controls{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(0,0,0,.9);backdrop-filter:blur(10px);border-bottom:1px solid #222;padding:12px 20px;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
    .controls button{padding:8px 16px;background:#1a1e28;color:#ccc;border:1px solid #2a2e38;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit}
    .controls button:hover{background:#222;border-color:#2dc653;color:#fff}
    .controls button.active{background:#2dc653;color:#000;border-color:#2dc653}
    .controls .nav-btn{font-size:1.2rem;padding:8px 14px;font-weight:800}
    .counter{font-size:.75rem;color:#555;min-width:80px;text-align:center}
    .preview{margin-top:70px;width:100%;max-width:500px;padding:20px}

    /* Blocked page styles (copied from blocked.html) */
    .bp{text-align:center;padding:40px 20px}
    .bp .character{width:120px;height:120px;margin:0 auto 24px}
    .bp .character svg{width:100%;height:100%;overflow:visible;filter:drop-shadow(0 8px 24px rgba(45,198,83,.2))}
    .bp h2{font-size:1.4rem;font-weight:800;margin-bottom:6px;line-height:1.3}
    .bp h2 span{color:#2dc653}
    .bp .pun{color:#999;font-size:1rem;line-height:1.6;margin-bottom:24px;min-height:3em}
    .bp .url{font-family:monospace;font-size:.75rem;color:#444;background:#111;padding:8px 14px;border-radius:8px;margin-bottom:20px;display:inline-block}
    .bp .footer{margin-top:24px;font-size:.7rem;color:#333}
    .bp .footer span{color:#2dc653}
    .bp .cat-label{display:inline-block;padding:4px 12px;background:rgba(45,198,83,.1);border:1px solid rgba(45,198,83,.2);border-radius:100px;font-size:.7rem;color:#2dc653;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:16px}
  </style>
</head>
<body>
  <div class="controls">
    <button class="nav-btn" id="prev">&larr;</button>
    <span class="counter" id="counter">1 / 36</span>
    <button class="nav-btn" id="next">&rarr;</button>
    <span style="color:#333;margin:0 4px">|</span>
    <button id="shuffle">Shuffle</button>
  </div>
  <div class="preview" id="preview"></div>

<script>
const G = '#2dc653';

function eyes(ex, ey, er) {
  er = er || 8;
  const gap = er * 1.6, iris = '#0a2a1a';
  const lx = -gap + ex, rx = gap + ex;
  return `<circle cx="${lx}" cy="${ey}" r="${er+2.5}" fill="#fff"/>
    <circle cx="${lx}" cy="${ey}" r="${er}" fill="${iris}"/><circle cx="${lx-er*.28}" cy="${ey-er*.28}" r="${er*.38}" fill="#fff" opacity=".8"/>
    <circle cx="${rx}" cy="${ey}" r="${er+2.5}" fill="#fff"/>
    <circle cx="${rx}" cy="${ey}" r="${er}" fill="${iris}"/><circle cx="${rx-er*.28}" cy="${ey-er*.28}" r="${er*.38}" fill="#fff" opacity=".8"/>`;
}
function mouth(mx, my) {
  return `<path d="M${mx-7},${my}Q${mx},${my+9} ${mx+7},${my}" fill="#0a2a1a"/><path d="M${mx-5},${my+1}Q${mx},${my+6} ${mx+5},${my+1}" fill="#fff"/>`;
}
const E = eyes, M = mouth;

const CHARS = {
  'social-media': `<svg viewBox="-40 -40 80 80" style="overflow:visible"><polygon points="-10,20 10,20 -5,40" fill="${G}"/><rect x="-32" y="-30" width="64" height="52" rx="26" fill="${G}"/>${E(0,-8)}${M(0,8)}</svg>`,
  'video-streaming': `<svg viewBox="-40 -40 80 80" style="overflow:visible"><path d="M-28,-32 Q-28,-40 -18,-40 L34,-6 Q42,0 34,6 L-18,40 Q-28,40 -28,32 Z" fill="${G}"/>${E(-5,0)}${M(-5,14)}</svg>`,
  'ads-trackers': `<svg viewBox="-40 -40 80 80" style="overflow:visible"><rect x="-25" y="14" width="10" height="30" rx="5" fill="${G}" transform="rotate(45,-20,18)"/><circle cx="0" cy="0" r="28" fill="${G}"/><circle cx="0" cy="0" r="20" fill="rgba(0,0,0,.13)"/>${E(0,-2)}${M(0,12)}</svg>`,
  'adult-content': `<svg viewBox="-40 -44 80 88" style="overflow:visible"><rect x="-28" y="-38" width="56" height="76" rx="28" fill="${G}"/><rect x="-24" y="-14" width="48" height="34" rx="20" fill="rgba(0,0,0,.13)"/><text x="0" y="-22" font-size="15" font-weight="900" fill="rgba(0,0,0,.3)" font-family="Arial" text-anchor="middle" dominant-baseline="middle">18+</text>${E(0,0)}${M(0,16)}</svg>`,
  'gambling': `<svg viewBox="-40 -44 80 88" style="overflow:visible"><rect x="-28" y="-36" width="56" height="72" rx="8" fill="${G}"/><text x="-18" y="-20" font-size="11" font-weight="900" fill="rgba(0,0,0,.28)" font-family="Arial" text-anchor="middle">A</text><text x="-18" y="-11" font-size="9" fill="rgba(0,0,0,.22)" font-family="Arial" text-anchor="middle">\u2660</text><text x="0" y="-18" font-size="20" fill="rgba(0,0,0,.2)" font-family="Arial" text-anchor="middle">\u2660</text>${E(0,0)}${M(0,14)}</svg>`,
  'gaming': `<svg viewBox="-40 -40 80 80" style="overflow:visible"><path d="M-26,26 L-26,-4 C-26,-32 -16,-36 0,-36 C16,-36 26,-32 26,-4 L26,26 Q20,18 14,26 Q8,34 0,26 Q-8,18 -14,26 Q-20,34 -26,26 Z" fill="${G}"/><ellipse cx="-32" cy="2" rx="9" ry="7" fill="${G}" transform="rotate(-20,-32,2)"/><ellipse cx="32" cy="2" rx="9" ry="7" fill="${G}" transform="rotate(20,32,2)"/>${E(0,-12)}${M(0,6)}</svg>`,
  'news': `<svg viewBox="-40 -40 80 80"><rect x="-30" y="-34" width="60" height="68" rx="8" fill="${G}"/><rect x="-24" y="-28" width="48" height="16" rx="4" fill="rgba(0,0,0,.18)"/><rect x="-24" y="-6" width="48" height="4" rx="2" fill="rgba(0,0,0,.12)"/><rect x="-24" y="4" width="48" height="4" rx="2" fill="rgba(0,0,0,.12)"/>${E(0,-2)}${M(0,16)}</svg>`,
  'dating': `<svg viewBox="-40 -40 80 80" style="overflow:visible"><path d="M0,32 C-8,26 -38,10 -38,-14 C-38,-30 -26,-38 -14,-34 C-8,-32 -4,-28 0,-22 C4,-28 8,-32 14,-34 C26,-38 38,-30 38,-14 C38,10 8,26 0,32 Z" fill="${G}"/>${E(0,-10)}${M(0,6)}</svg>`,
  'shopping': `<svg viewBox="-40 -44 80 88" style="overflow:visible"><path d="M-30,-38 L-30,-16 Q-30,-12 -26,-12 L26,-12 Q30,-12 30,-16 L30,-38" fill="none" stroke="${G}" stroke-width="9" stroke-linecap="round"/><path d="M-32,-12 L32,-12 L26,32 Q26,36 22,36 L-22,36 Q-26,36 -26,32 Z" fill="${G}"/>${E(0,4)}${M(0,20)}</svg>`,
  'ai': `<svg viewBox="-40 -44 80 88" style="overflow:visible"><circle cx="0" cy="-40" r="6" fill="${G}"/><rect x="-3" y="-35" width="6" height="14" rx="3" fill="${G}"/><rect x="-40" y="-8" width="10" height="16" rx="5" fill="${G}"/><rect x="30" y="-8" width="10" height="16" rx="5" fill="${G}"/><rect x="-32" y="-22" width="64" height="54" rx="12" fill="${G}"/><rect x="-25" y="-16" width="50" height="40" rx="8" fill="rgba(0,0,0,.13)"/>${E(0,-4)}${M(0,14)}</svg>`,
  'crypto': `<svg viewBox="-40 -40 80 80" style="overflow:visible"><circle cx="0" cy="0" r="34" fill="${G}"/><circle cx="0" cy="0" r="34" fill="none" stroke="rgba(0,0,0,.18)" stroke-width="5"/><circle cx="0" cy="0" r="25" fill="none" stroke="rgba(0,0,0,.08)" stroke-width="1.5"/><text x="0" y="-12" font-size="20" font-weight="900" fill="rgba(0,0,0,.25)" font-family="Arial" text-anchor="middle" dominant-baseline="middle">\u20BF</text>${E(0,6)}${M(0,20)}</svg>`,
  'security-threats': `<svg viewBox="-40 -44 80 88" style="overflow:visible"><path d="M0,-38 C14,-38 32,-32 32,-18 L32,6 C32,24 20,36 0,42 C-20,36 -32,24 -32,6 L-32,-18 C-32,-32 -14,-38 0,-38 Z" fill="${G}"/><path d="M0,-29 C10,-29 25,-24 25,-14 L25,4 C25,18 14,27 0,32 C-14,27 -25,18 -25,4 L-25,-14 C-25,-24 -10,-29 0,-29 Z" fill="rgba(0,0,0,.11)"/>${E(0,-6)}${M(0,10)}</svg>`,
};

const PUNS = {
  'social-media': [
    "Shhh\u2026 your social feeds are taking a nap. Go make some real-life memories!",
    "This feed has been switched off. Your future self says thanks.",
    "No scrolling here! Your social switch is doing its job.",
  ],
  'video-streaming': [
    "Plot twist: there's a whole world outside this screen.",
    "Your streaming switch said \u2018that's enough episodes for now.\u2019",
    "The stream has been switched off. Time for something offline!",
  ],
  'ads-trackers': [
    "Nothing to track here! Your ad switch is keeping you invisible.",
    "Ads? Never heard of them. Your tracker switch says you're welcome.",
    "This ad has been switched off. Your attention is not for sale.",
  ],
  'adult-content': [
    "This content has been switched off. Your 18+ switch is on guard.",
    "Nothing to see here! Literally. Your adult switch is working.",
    "Switched off. Your 18+ guard is keeping things clean.",
  ],
  'gambling': [
    "The house always wins\u2026 but not today. Your gambling switch folded this hand.",
    "No bets here! Your gambling switch says the odds are in your favour.",
    "All in\u2026 on self-control. Your gambling switch played the winning hand.",
  ],
  'gaming': [
    "Game over! \u2026for distractions, that is. Your gaming switch used BLOCK!",
    "Your gaming switch used BLOCK. It's super effective!",
    "Achievement unlocked: Self-control! +100 XP. Your gaming switch levels you up.",
  ],
  'news': [
    "Breaking news: You don't need to read more news right now.",
    "Extra! Extra! Your news switch says take a break!",
    "Your daily doom-scroll quota has been reached. Come back never.",
  ],
  'dating': [
    "Your dating switch swiped left on this site. You deserve better!",
    "This match has been unmatched. Your dating switch knows your worth.",
    "Switched off! The only connection you need right now is with yourself.",
  ],
  'shopping': [
    "Your cart is empty and your wallet is full. Your shopping switch did that.",
    "This store is closed! Your shopping switch saved you from impulse buys.",
    "Add to cart? More like add to \u2018things I don't need.\u2019 Switched off!",
  ],
  'ai': [
    "Your AI switch said \u2018I'm sorry Dave, I can't let you do that.\u2019",
    "The robots can wait. Your AI switch has spoken.",
    "Switched off! Sometimes the best prompt is touching grass.",
  ],
  'crypto': [
    "HODL\u2026 your attention, that is. Your crypto switch is protecting your focus.",
    "This coin has been switched off. To the moon? More like to bed.",
    "Your crypto switch says the real investment is in yourself.",
  ],
  'security-threats': [
    "Threat neutralised! Your security switch has your back.",
    "This site has been flagged and switched off. Your shield is up!",
    "Your security switch blocked this threat. Stay safe out there!",
  ],
};

const NAMES = {
  'social-media': 'Social Media', 'video-streaming': 'Streaming', 'ads-trackers': 'Ads & Trackers',
  'adult-content': 'Adult Content', 'gambling': 'Gambling', 'gaming': 'Gaming',
  'news': 'News', 'dating': 'Dating', 'shopping': 'Shopping',
  'ai': 'AI', 'crypto': 'Crypto', 'security-threats': 'Security',
};

const DOMAINS = {
  'social-media': 'instagram.com', 'video-streaming': 'youtube.com', 'ads-trackers': 'doubleclick.net',
  'adult-content': 'example-adult.com', 'gambling': 'bet365.com', 'gaming': 'store.steampowered.com',
  'news': 'cnn.com', 'dating': 'tinder.com', 'shopping': 'amazon.com',
  'ai': 'chatgpt.com', 'crypto': 'coinbase.com', 'security-threats': 'malware-site.example',
};

// Build flat list of all combos
const ALL = [];
for (const [catId, puns] of Object.entries(PUNS)) {
  puns.forEach((pun, i) => ALL.push({ catId, pun, index: i }));
}

let current = 0;

function renderPage(idx) {
  const item = ALL[idx];
  const preview = document.getElementById('preview');
  preview.innerHTML = `
    <div class="bp">
      <div class="cat-label">${NAMES[item.catId]} \u2014 Pun ${item.index + 1}/3</div>
      <div class="character">${CHARS[item.catId]}</div>
      <h2>Switched off by <span>FuseBox</span></h2>
      <p class="pun">${item.pun}</p>
      <div class="url">${DOMAINS[item.catId]}</div>
      <div class="footer">Protected by <span>Fuse</span>Box \u2014 your kill switch for the internet</div>
    </div>
  `;
  document.getElementById('counter').textContent = `${idx + 1} / ${ALL.length}`;
}

document.getElementById('prev').addEventListener('click', () => {
  current = (current - 1 + ALL.length) % ALL.length;
  renderPage(current);
});
document.getElementById('next').addEventListener('click', () => {
  current = (current + 1) % ALL.length;
  renderPage(current);
});
document.getElementById('shuffle').addEventListener('click', () => {
  current = Math.floor(Math.random() * ALL.length);
  renderPage(current);
});

// Keyboard nav
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') { current = (current - 1 + ALL.length) % ALL.length; renderPage(current); }
  if (e.key === 'ArrowRight') { current = (current + 1) % ALL.length; renderPage(current); }
  if (e.key === ' ') { e.preventDefault(); current = Math.floor(Math.random() * ALL.length); renderPage(current); }
});

renderPage(0);
</script>
</body>
</html>
