<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FuseBoard — If Apple Designed It</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{font-family:-apple-system,BlinkMacSystemFont,'Inter','SF Pro Display','Helvetica Neue',sans-serif;background:#e8e8ed;color:#1d1d1f;padding:40px 20px;-webkit-font-smoothing:antialiased}
h1{text-align:center;font-size:1.3rem;margin-bottom:30px;font-weight:700;color:#1d1d1f;letter-spacing:-.02em}

.popup{
  width:440px;margin:0 auto;padding:0;
  background:#fff;
  border-radius:14px;
  box-shadow:0 0 0 .5px rgba(0,0,0,.08),0 8px 40px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.04);
  overflow:hidden
}

/* Header — clean, plenty of space */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px}
.logo{font-weight:700;font-size:.95rem;letter-spacing:-.02em;color:#1d1d1f}
.logo .dot{display:inline-block;width:5px;height:5px;background:#34c759;border-radius:50%;margin:0 .5px}
.opts-btn{background:none;border:none;color:#86868b;cursor:pointer;padding:6px;border-radius:8px;transition:.15s}
.opts-btn:hover{background:rgba(0,0,0,.04);color:#1d1d1f}

/* Segmented status bar */
.segment{display:flex;margin:0 16px 14px;background:#f5f5f7;border-radius:8px;padding:2px;gap:1px}
.segment .seg{flex:1;text-align:center;padding:6px 0;font-size:.7rem;font-weight:600;border-radius:7px;color:#86868b;cursor:pointer;transition:.2s}
.segment .seg.active{background:#fff;color:#1d1d1f;box-shadow:0 1px 3px rgba(0,0,0,.06),0 0 0 .5px rgba(0,0,0,.04)}

/* List — Apple uses lists, not grids */
.fuse-list{padding:0 6px 6px}

.fuse-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 12px;
  border-radius:10px;
  transition:.15s;
  cursor:pointer
}
.fuse-item:hover{background:rgba(0,0,0,.025)}
.fuse-item:active{background:rgba(0,0,0,.04);transform:scale(.995)}

/* Icon circle */
.fi-icon{
  width:36px;height:36px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:.2s
}
.fi-icon svg{width:18px;height:18px}

/* Text column */
.fi-text{flex:1;min-width:0}
.fi-name{font-size:.85rem;font-weight:600;color:#1d1d1f;letter-spacing:-.01em}
.fi-sub{font-size:.7rem;color:#86868b;margin-top:1px}

/* Apple toggle */
.fi-toggle{
  width:42px;height:26px;border-radius:13px;
  position:relative;cursor:pointer;flex-shrink:0;
  transition:.25s ease;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.04)
}
.fi-toggle[data-on="0"]{background:#e5e5ea}
.fi-toggle[data-on="1"]{background:#34c759}
.fi-toggle .knob{
  position:absolute;top:2px;width:22px;height:22px;
  border-radius:50%;background:#fff;
  transition:.25s cubic-bezier(.22,1,.36,1);
  box-shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06),0 0 0 .5px rgba(0,0,0,.04)
}
.fi-toggle[data-on="0"] .knob{left:2px}
.fi-toggle[data-on="1"] .knob{left:18px}

/* Chevron */
.fi-chev{color:#c7c7cc;flex-shrink:0;margin-left:2px}
.fi-chev svg{width:14px;height:14px}

/* Separator — Apple's thin hairline */
.fuse-item+.fuse-item{border-top:0.5px solid rgba(0,0,0,.06);margin-left:60px;border-radius:0;margin-left:0}
.fuse-item+.fuse-item::before{content:'';display:block}

/* Actually Apple does separators with left offset */
.sep{height:.5px;background:rgba(0,0,0,.08);margin:0 12px 0 60px}

/* Status summary — bottom bar */
.summary{
  padding:12px 18px;
  background:#f5f5f7;
  border-top:.5px solid rgba(0,0,0,.06);
  display:flex;align-items:center;justify-content:space-between;
  font-size:.72rem;color:#86868b
}
.summary .count{font-weight:600;color:#1d1d1f}

/* ═════════════════════════════════════════
   COLOUR CODING — subtle, Apple-like
   ═════════════════════════════════════════ */
/* Category icon backgrounds */
.ic-social{background:#007aff12;color:#007aff}
.ic-video{background:#ff375f12;color:#ff375f}
.ic-news{background:#5856d612;color:#5856d6}
.ic-shop{background:#ff950012;color:#ff9500}
.ic-game{background:#af52de12;color:#af52de}
.ic-date{background:#ff2d5512;color:#ff2d55}
.ic-security{background:#34c75912;color:#34c759}
.ic-ads{background:#ff636312;color:#ff6363}
.ic-gamble{background:#ffcc0012;color:#ffcc00}
.ic-ai{background:#5ac8fa12;color:#5ac8fa}
.ic-crypto{background:#ff950012;color:#ff9500}
.ic-adult{background:#86868b12;color:#86868b}

/* Blocked state — icon gets filled bg */
.fuse-item[data-on="1"] .ic-social{background:#007aff18}
.fuse-item[data-on="1"] .ic-video{background:#ff375f18}
.fuse-item[data-on="1"] .ic-news{background:#5856d618}
.fuse-item[data-on="1"] .ic-shop{background:#ff950018}
.fuse-item[data-on="1"] .ic-game{background:#af52de18}
.fuse-item[data-on="1"] .ic-date{background:#ff2d5518}
.fuse-item[data-on="1"] .ic-security{background:#34c75918}
.fuse-item[data-on="1"] .ic-ads{background:#ff636318}
.fuse-item[data-on="1"] .ic-gamble{background:#ffcc0018}
.fuse-item[data-on="1"] .ic-ai{background:#5ac8fa18}
.fuse-item[data-on="1"] .ic-crypto{background:#ff950018}
.fuse-item[data-on="1"] .ic-adult{background:#86868b18}

/* Dimmed when off */
.fuse-item[data-on="0"] .fi-name{color:#86868b}
.fuse-item[data-on="0"] .fi-icon{opacity:.5}
</style>
</head>
<body>

<h1>If Apple designed FuseBoard</h1>

<div class="popup">
  <div class="header">
    <div class="logo">Fuse<span class="dot"></span>Board</div>
    <button class="opts-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <div class="segment">
    <div class="seg active">All</div>
    <div class="seg">Blocked</div>
    <div class="seg">Unblocked</div>
  </div>

  <div class="fuse-list" id="list"></div>

  <div class="summary">
    <span><span class="count" id="count">5</span> of 12 categories blocked</span>
    <span style="color:#007aff;font-weight:600;cursor:pointer">Settings</span>
  </div>
</div>

<script>
const cats = [
  {name:'Social Media',sub:'8 sites · YouTube, Instagram, TikTok…',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',ic:'ic-social',on:true},
  {name:'Video Streaming',sub:'5 sites · Netflix, Disney+, Twitch…',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>',ic:'ic-video',on:false},
  {name:'News & Media',sub:'9 sites · BBC, CNN, Reddit…',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/></svg>',ic:'ic-news',on:true},
  {name:'Shopping',sub:'7 sites · Amazon, eBay, Etsy…',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>',ic:'ic-shop',on:true},
  {name:'Gaming',sub:'4 sites · Steam, Epic, Xbox…',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="6"/><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/></svg>',ic:'ic-game',on:false},
  {name:'Dating',sub:'3 sites · Tinder, Bumble, Hinge',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',ic:'ic-date',on:true},
  {name:'Security Threats',sub:'6 sites · Malware, phishing domains',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',ic:'ic-security',on:false},
  {name:'Ads & Trackers',sub:'4 categories · Analytics, retargeting',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>',ic:'ic-ads',on:true},
  {name:'Gambling',sub:'5 sites · Bet365, PokerStars…',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="4"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/><circle cx="16" cy="16" r="1.5" fill="currentColor"/></svg>',ic:'ic-gamble',on:false},
  {name:'AI Tools',sub:'3 sites · ChatGPT, Midjourney…',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4v2a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M12 18v4"/><path d="M8 22h8"/></svg>',ic:'ic-ai',on:false},
  {name:'Crypto',sub:'4 sites · Coinbase, Binance…',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',ic:'ic-crypto',on:false},
  {name:'Adult Content',sub:'8 categories · NSFW sites',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',ic:'ic-adult',on:false},
];

const list = document.getElementById('list');
const countEl = document.getElementById('count');

function updateCount(){
  const on = document.querySelectorAll('.fuse-item[data-on="1"]').length;
  countEl.textContent = on;
}

cats.forEach((cat, i) => {
  if (i > 0) {
    const sep = document.createElement('div');
    sep.className = 'sep';
    list.appendChild(sep);
  }

  const item = document.createElement('div');
  item.className = 'fuse-item';
  item.dataset.on = cat.on ? '1' : '0';

  item.innerHTML = `
    <div class="fi-icon ${cat.ic}">${cat.icon}</div>
    <div class="fi-text">
      <div class="fi-name">${cat.name}</div>
      <div class="fi-sub">${cat.sub}</div>
    </div>
    <div class="fi-toggle" data-on="${cat.on?1:0}"><div class="knob"></div></div>
    <div class="fi-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div>
  `;

  const toggle = item.querySelector('.fi-toggle');
  toggle.addEventListener('click', (e) => {
    e.stopPropagation();
    const on = toggle.dataset.on === '1';
    toggle.dataset.on = on ? '0' : '1';
    item.dataset.on = on ? '0' : '1';
    updateCount();
  });

  list.appendChild(item);
});

// Segment filter
document.querySelectorAll('.seg').forEach(seg => {
  seg.addEventListener('click', () => {
    document.querySelectorAll('.seg').forEach(s => s.classList.remove('active'));
    seg.classList.add('active');
    const filter = seg.textContent;
    document.querySelectorAll('.fuse-item').forEach(item => {
      const sep = item.previousElementSibling;
      if (filter === 'All') {
        item.style.display = '';
        if (sep?.classList.contains('sep')) sep.style.display = '';
      } else if (filter === 'Blocked') {
        const show = item.dataset.on === '1';
        item.style.display = show ? '' : 'none';
        if (sep?.classList.contains('sep')) sep.style.display = show ? '' : 'none';
      } else {
        const show = item.dataset.on === '0';
        item.style.display = show ? '' : 'none';
        if (sep?.classList.contains('sep')) sep.style.display = show ? '' : 'none';
      }
    });
  });
});
</script>
</body>
</html>
