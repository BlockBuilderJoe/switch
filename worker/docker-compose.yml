services:
  circuit-breaker:
    build: .
    image: josephpalmer/circuit-breaker:latest
    ports:
      - "8787:8787"
    volumes:
      - cb-data:/data
    environment:
      - JWT_SECRET=change-me-to-a-long-random-string
      - DB_PATH=/data/circuitbreaker.db
      - PORT=8787
    restart: unless-stopped

volumes:
  cb-data:
