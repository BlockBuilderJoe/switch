services:
  fusebox:
    build: .
    image: fusebox/sync
    ports:
      - "8787:8787"
    volumes:
      - fusebox-data:/data
    environment:
      - JWT_SECRET=change-me-to-a-long-random-string
      - DB_PATH=/data/fusebox.db
      - PORT=8787
    restart: unless-stopped

volumes:
  fusebox-data:
