<!DOCTYPE html>

<head>

<title>FuseBoard — 100 Concepts</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&family=Outfit:wght@400;600;700;800&family=Sora:wght@400;600;700;800&family=Crimson+Pro:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0a0c10;color:#e8eaf0;padding:30px 20px}
h1{text-align:center;font-size:1.8rem;margin-bottom:6px;font-weight:800;letter-spacing:-.03em}
p.sub{text-align:center;color:#6b7280;font-size:.85rem;margin-bottom:30px}
.controls{display:flex;justify-content:center;gap:8px;margin-bottom:30px;flex-wrap:wrap}
.controls button{padding:6px 16px;border-radius:20px;border:1px solid #2a2e38;background:#14161c;color:#9ca3b4;font-size:.75rem;cursor:pointer;font-family:inherit;transition:.15s}
.controls button:hover,.controls button.active{background:#22c55e;color:#000;border-color:#22c55e}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;max-width:1600px;margin:0 auto}
.card{border-radius:14px;padding:12px 10px;position:relative;overflow:hidden;cursor:pointer;transition:transform .15s}
.card:hover{transform:scale(1.02)}
.card-num{position:absolute;top:6px;left:8px;font-size:.55rem;font-weight:700;opacity:.3;z-index:10}
.card-name{text-align:center;font-size:.6rem;font-weight:600;margin-bottom:8px;opacity:.5;position:relative;z-index:2}
.mini-grid{display:flex;gap:6px;justify-content:center;align-items:stretch;position:relative;z-index:2}
.mini-fuse{display:flex;flex-direction:column;align-items:center;gap:0;width:56px}

/* Base elements */
.m-cd{width:var(--cd-s,8px);height:var(--cd-s,8px);border-radius:var(--cd-r,50%);transition:.3s}
.m-wire{width:var(--wire-w,6px);height:var(--wire-h,14px);border-radius:var(--wire-r,3px);position:relative;overflow:hidden}
.m-wire::after{content:'';position:absolute;left:0;right:0;top:calc(-1 * var(--wire-h,14px));height:var(--wire-h,14px);border-radius:var(--wire-r,3px)}
.m-box{width:100%;flex:1;border-radius:var(--box-r,10px);padding:8px 4px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:.2s;position:relative;overflow:hidden}
.m-icon{width:16px;height:16px;transition:.2s}
.m-icon svg{width:100%;height:100%}
.m-lb{font-weight:var(--lb-w,700);font-size:var(--lb-s,.72rem);text-align:center;line-height:1.15;transition:.2s}
.m-trk{width:var(--trk-w,22px);height:var(--trk-h,34px);border-radius:var(--trk-r,7px);position:relative;overflow:hidden;cursor:pointer}
.m-lev{position:absolute;left:2px;right:2px;height:var(--lev-h,13px);border-radius:var(--lev-r,5px);transition:.2s cubic-bezier(.22,1,.36,1)}
.m-inf{font-size:.55rem;opacity:.5}

@keyframes fl{0%{top:calc(-1 * var(--wire-h,14px))}100%{top:calc(100% + var(--wire-h,14px))}}
.mini-fuse:nth-child(1) .m-wire::after{animation-delay:0s}
.mini-fuse:nth-child(2) .m-wire::after{animation-delay:.1s}
.mini-fuse:nth-child(3) .m-wire::after{animation-delay:.2s}

.hidden{display:none!important}
</style>
</head>

// Convert palette configs to full concept configs
palettes.forEach(p => {
  const h = p.hue, s = p.sat;
  const isDark = p.bg === 'd';
  const fi = Math.floor(Math.random()*fonts.length);
  const brs = [0,4,8,12,16,20];
  const br = brs[Math.floor(Math.random()*brs.length)];
  const wws = [4,6,8,10];
  const ww = wws[Math.floor(Math.random()*wws.length)];

  let cfg;
  if (isDark) {
    const bgL = 6 + Math.floor(Math.random()*6);
    cfg = {
      bg: s > 15 ? `linear-gradient(135deg,${hsl(h,s,bgL)},${hsl(h+10,s-5,bgL+2)})` : hsl(h,s,bgL),
      cardBg: hsla(h,s*0.4,bgL+8,.45),
      cardBorder: hsla(h,s*0.6,50,.08+Math.random()*.08),
      text: hsl(h,s*0.4,65),
      textOn: hsl(h,s*0.3,88),
      wireOff: hsl((h+180)%360,20,14),
      wireOn: hsl(h,25,14),
      pulseOff: `${hsl(0,70,58)},${hsl(0,70,68)}`,
      pulseOn: `${hsl(h,60,50)},${hsl(h,55,65)}`,
      levOff: `${hsl(h,s*0.3,35)},${hsl(h,s*0.3,25)}`,
      levOn: `${hsl(h,s*0.7,48)},${hsl(h,s*0.7,38)}`,
      cdBg: hsl(h,s*0.3,12),
      cdBorder: hsl(h,s*0.4,22),
      trkBg: hsl(h,s*0.2,5),
      iconOff: hsl(h,s*0.3,28),
      iconOn: hsl(h,s*0.5,60),
      font: fonts[fi],
      boxR: br+'px',
      wireW: ww+'px',
      wireH: (ww+8)+'px',
    };
  } else {
    const bgL = 92 + Math.floor(Math.random()*5);
    cfg = {
      bg: s > 15 ? `linear-gradient(135deg,${hsl(h,s*0.4,bgL)},${hsl(h+10,s*0.3,bgL-2)})` : hsl(h,s*0.3,bgL),
      cardBg: hsla(h,s*0.2,99,.7),
      cardBorder: hsla(h,s*0.3,40,.08+Math.random()*.06),
      text: hsl(h,s*0.3,38),
      textOn: hsl(h,s*0.3,15),
      wireOff: hsl(0,s*0.3,82),
      wireOn: hsl(140,25,80),
      pulseOff: `${hsl(0,60,55)},${hsl(0,55,65)}`,
      pulseOn: `${hsl(140,55,42)},${hsl(140,50,55)}`,
      levOff: `${hsl(h,s*0.2,62)},${hsl(h,s*0.2,50)}`,
      levOn: `${hsl(140,50,42)},${hsl(140,55,32)}`,
      cdBg: hsl(h,s*0.2,85),
      cdBorder: hsl(h,s*0.2,75),
      trkBg: hsl(h,s*0.15,88),
      iconOff: hsl(h,s*0.2,70),
      iconOn: hsl(h,s*0.3,30),
      font: fonts[fi],
      boxR: br+'px',
      wireW: ww+'px',
      wireH: (ww+8)+'px',
    };
  }
  C(p.name, p.tags, cfg);
});

function renderConcept(c, idx) {
  const cfg = c.cfg;
  const id = `c${idx}`;
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.tags = c.tags.join(' ');
  card.style.cssText = `background:${cfg.bg};font-family:${cfg.font};--box-r:${cfg.boxR};--wire-w:${cfg.wireW};--wire-h:${cfg.wireH}`;

  const states = [
    {w:'green',s:'1'},
    {w:'red',s:'0'},
    {w:'amber',s:'1'},
  ];

  let fusesHtml = '';
  states.forEach((st,i) => {
    const isOn = st.s==='1';
    const wireCol = st.w==='green'?cfg.wireOn:st.w==='amber'?cfg.wireOff:cfg.wireOff;
    const pulseCols = st.w==='green'?cfg.pulseOn:st.w==='amber'?
      (cfg.pulseOff.replace(/ef4444|d05050|e04848|e06090|ff4080|ff2020|40a040|0060e0|a040e0|8040e0|c85020|aa3030|b87040|d85050|4080e0|6090c0|a040e0|c07838/g,m=>'f59e0b').replace(/f87171|e07070|e87878|f080a0|ff70a0|ff6060|60c060|2080ff|c060ff|a060ff|e07040|cc5050|d89858|e07070|60a0ff|80b0e0|c060ff|d09060/g,m=>'fbbf24'))
      :cfg.pulseOff;
    const levCols = isOn?cfg.levOn:cfg.levOff;
    const [l1,l2] = levCols.split(',');
    const iconCol = isOn?cfg.iconOn:cfg.iconOff;
    const textCol = isOn?cfg.textOn:cfg.text;
    const [p1,p2] = pulseCols.split(',');

    // Terminal glow for green
    const cdExtra = st.w==='green'?`box-shadow:0 0 4px ${cfg.iconOn}33`:
                    st.w==='amber'?`box-shadow:0 0 3px rgba(245,158,11,.2)`:'';
    const cdBorderCol = st.w==='green'?cfg.iconOn+'80':st.w==='amber'?'rgba(245,158,11,.4)':cfg.cdBorder;

    fusesHtml += `
      <div class="mini-fuse" data-s="${st.s}" data-w="${st.w}">
        <div class="m-cd" style="background:${cfg.cdBg};border:2px solid ${cdBorderCol};${cdExtra}"></div>
        <div class="m-wire m-wi" style="background:${cfg.wireOff};box-shadow:inset 1px 0 1px rgba(0,0,0,.15),inset -1px 0 1px rgba(0,0,0,.15)">
          <div style="position:absolute;left:0;right:0;top:calc(-1*var(--wire-h,14px));height:var(--wire-h,14px);border-radius:var(--wire-r,3px);background:linear-gradient(180deg,transparent,${cfg.pulseOff.split(',')[0]},${cfg.pulseOff.split(',')[1]},${cfg.pulseOff.split(',')[0]},transparent);animation:fl .6s linear infinite;animation-delay:${i*0.1}s"></div>
        </div>
        <div class="m-box" style="background:${cfg.cardBg};border:1px solid ${st.w==='green'?cfg.iconOn+'20':st.w==='amber'?'rgba(245,158,11,.15)':cfg.cardBorder}">
          <div class="m-icon" style="color:${iconCol}">${icons[i]}</div>
          <div class="m-lb" style="color:${textCol}">${names[i]}</div>
          <div class="m-trk" style="background:${cfg.trkBg};border:1px solid ${cfg.cardBorder}">
            <div class="m-lev" style="background:linear-gradient(180deg,${l1},${l2});${isOn?'top:auto;bottom:2px':'top:2px'};${isOn?`box-shadow:0 0 8px ${cfg.iconOn}40`:'box-shadow:0 2px 3px rgba(0,0,0,.3)'}"></div>
          </div>
          <div class="m-inf" style="color:${cfg.text}">6 sites</div>
        </div>
        <div class="m-wire" style="background:${wireCol};box-shadow:inset 1px 0 1px rgba(0,0,0,.15),inset -1px 0 1px rgba(0,0,0,.15)">
          <div style="position:absolute;left:0;right:0;top:calc(-1*var(--wire-h,14px));height:var(--wire-h,14px);border-radius:var(--wire-r,3px);background:linear-gradient(180deg,transparent,${p1},${p2},${p1},transparent);animation:fl ${st.w==='amber'?'1.2':st.w==='green'?'.9':'.6'}s linear infinite;animation-delay:${i*0.1}s"></div>
        </div>
        <div class="m-cd" style="background:${cfg.cdBg};border:2px solid ${cdBorderCol};${cdExtra}"></div>
      </div>`;
  });

  card.innerHTML = `
    <div class="card-num">#${idx+1}</div>
    <div class="card-name">${c.name}</div>
    <div class="mini-grid">${fusesHtml}</div>
  `;

  card.addEventListener('click', () => {
    const ov = document.getElementById('overlay');
    const oc = document.getElementById('overlay-content');
    const clone = card.cloneNode(true);
    clone.style.transform = 'scale(1.6)';
    clone.style.transformOrigin = 'top center';
    clone.style.borderRadius = '14px';
    clone.style.pointerEvents = 'none';
    oc.innerHTML = '';
    oc.appendChild(clone);
    ov.style.display = 'block';
  });

  return card;
}

const grid = document.getElementById('grid');
concepts.forEach((c,i) => grid.appendChild(renderConcept(c,i)));

// Filter
document.querySelectorAll('.controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.f;
    document.querySelectorAll('.card').forEach(card => {
      if (f === 'all') { card.classList.remove('hidden'); return; }
      card.classList.toggle('hidden', !card.dataset.tags.includes(f));
    });
  });
});
</script>
