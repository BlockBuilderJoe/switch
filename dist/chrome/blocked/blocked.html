<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tripped — Circuit Breaker</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#000;color:#e4e6ea;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
    .wrap{max-width:440px}
    .character{width:120px;height:120px;margin:0 auto 24px}
    .character svg{width:100%;height:100%;overflow:visible;filter:drop-shadow(0 8px 24px rgba(45,198,83,.2))}
    h1{font-size:1.4rem;font-weight:800;margin-bottom:6px;line-height:1.3}
    h1 span{color:#2dc653}
    .pun{color:#999;font-size:1rem;line-height:1.6;margin-bottom:24px;min-height:3em}
    .url{font-family:monospace;font-size:.75rem;color:#444;background:#111;padding:8px 14px;border-radius:8px;margin-bottom:20px;word-break:break-all}
    .btn{display:inline-block;padding:10px 24px;background:#1a1e28;color:#ccc;border:1px solid #2a2e38;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;text-decoration:none;transition:.15s}
    .btn:hover{background:#222630;border-color:#2dc653;color:#fff}
    .footer{margin-top:32px;font-size:.7rem;color:#333}
    .footer span{color:#2dc653}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="character" id="character"></div>
    <h1 id="title">Tripped by <span>Circuit Breaker</span></h1>
    <p class="pun" id="pun"></p>
    <div class="url" id="blocked-url"></div>
    <a href="#" class="btn" id="go-back">&larr; Go Back</a>
    <div class="footer">Protected by <span>Circuit</span> Breaker — your circuit breaker for the internet</div>
  </div>
  <script src="../data/blocklists.js"></script>
  <script src="blocked.js"></script>
</body>
</html>
