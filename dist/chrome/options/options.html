<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FuseBoard — Configuration</title>
  <link rel="stylesheet" href="../popup/popup.css">
  <style>
    body { width: 100%; max-width: 700px; margin: 0 auto; padding: 32px 20px; }
    .header { margin-bottom: 20px; }
    .logo { font-size: 1.3rem; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: none; color: var(--text-sec); font-size: .82rem; font-weight: 600; cursor: pointer; padding: 8px 12px; border-radius: 8px; margin-bottom: 12px; transition: .15s; }
    .back-btn:hover { color: var(--text); background: var(--surface); }
    .back-btn svg { width: 16px; height: 16px; }
    .section-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 14px; }
    .fuse-box { min-height: 110px; }
    .fuse-cell { padding: 10px 6px; }
    .fuse-cfg { font-size: .5rem; color: #2a2e36; transition: .15s; cursor: pointer; }
    .fuse-cell:hover .fuse-cfg { color: #555; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Fuse<span class="dot"></span>Board <span class="version">v1.5.0</span></div>
  </div>

  <div id="nav"></div>
  <div id="title" class="section-title">Your FuseBoard</div>
  <div id="fuseboard"></div>

  <div class="status" id="status">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text"></span>
  </div>

  <!-- Sync Section -->
  <div id="sync-section" style="margin-top:28px;padding:20px;background:#0c0e14;border:1px solid #1a1e28;border-radius:14px">
    <div id="sync-content"></div>
  </div>

  <div style="margin-top:24px;text-align:center">
    <button id="changelog-toggle" style="background:none;border:none;color:#3a3e48;font-size:.72rem;cursor:pointer;padding:6px 12px;border-radius:6px;transition:.15s;font-family:inherit">Changelog</button>
  </div>

  <div id="changelog" style="display:none;margin-top:12px;padding:20px;background:#0c0e14;border:1px solid #1a1e28;border-radius:12px;max-height:400px;overflow-y:auto;font-size:.78rem;line-height:1.6;color:#888">
  </div>

  <script src="../data/blocklists.js"></script>
  <script src="options.js"></script>
</body>
</html>
